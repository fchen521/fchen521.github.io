<h5 id="Jquery-前端知识记录"><a href="#Jquery-前端知识记录" class="headerlink" title="Jquery 前端知识记录"></a>Jquery 前端知识记录</h5><h5 id="Jquery动态创建表单"><a href="#Jquery动态创建表单" class="headerlink" title="Jquery动态创建表单"></a>Jquery动态创建表单</h5><figure class="highlight ruby"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br></pre></td><td class="code"><pre><span class="line">&lt;body&gt;</span><br><span class="line">  /* 添加表单按钮 *<span class="regexp">/</span></span><br><span class="line"><span class="regexp">  &lt;button onclick="addHtml()"&gt;add&lt;/button</span>&gt;</span><br><span class="line">  &lt;div id=<span class="string">"log"</span>&gt;</span><br><span class="line">  &lt;h3&gt;表单<span class="symbol">:&lt;/h3&gt;</span></span><br><span class="line">                /* 模拟数据回显存在的表单 *<span class="regexp">/</span></span><br><span class="line"><span class="regexp">		&lt;div&gt;</span></span><br><span class="line">			&lt;input/&gt; &lt;input/&gt; &lt;button class="btn row_data"&gt;remove&lt;/button&gt;</span><br><span class="line">	        &lt;<span class="regexp">/div&gt;</span></span><br><span class="line"><span class="regexp">		&lt;div id='div'&gt;</span></span><br><span class="line">			&lt;input/&gt; &lt;input/&gt; &lt;button class="btn row_data"&gt;remove&lt;/button&gt;</span><br><span class="line">		&lt;<span class="regexp">/div&gt;</span></span><br><span class="line"><span class="regexp">		&lt;div&gt;</span></span><br><span class="line">			&lt;input/&gt;&lt;input/&gt;&lt;button class="btn row_data"&gt;remove&lt;/button&gt;</span><br><span class="line">		&lt;<span class="regexp">/div&gt;</span></span><br><span class="line"><span class="regexp">	&lt;/div</span>&gt;</span><br><span class="line">&lt;script&gt;</span><br><span class="line">	var num = <span class="number">1</span>;</span><br><span class="line">	function addHtml()&#123;</span><br><span class="line">		num++;</span><br><span class="line">		var $log = $( <span class="string">"#log"</span> );</span><br><span class="line">                /* 要生成表单 *<span class="regexp">/</span></span><br><span class="line"><span class="regexp">		str = "&lt;div id='div"+num+"'&gt;&lt;input/</span>&gt; &lt;input/&gt; &lt;button onclick=<span class="string">'removeHtml("+num+")'</span>&gt;remove&lt;<span class="regexp">/button&gt;&lt;/div</span>&gt;<span class="string">";</span></span><br><span class="line"><span class="string">		var html = $.parseHTML( str );</span></span><br><span class="line"><span class="string">		$log.append( html );</span></span><br><span class="line"><span class="string">	&#125;</span></span><br><span class="line"><span class="string">	function removeHtml(id)&#123;</span></span><br><span class="line"><span class="string">		$("</span><span class="comment">#div"+id).remove();</span></span><br><span class="line">	&#125;</span><br><span class="line">	</span><br><span class="line">        /* 通过按钮的<span class="class"><span class="keyword">class</span>属性，定位选择要删除的表单 */</span></span><br><span class="line">	$(<span class="string">".row_data"</span>).click(function(e)&#123;</span><br><span class="line">		var i = $(<span class="string">".row_data"</span>).index($(this));</span><br><span class="line">		$(<span class="string">".row_data"</span>).eq(i).parent().remove();</span><br><span class="line">	&#125;)</span><br><span class="line">&lt;<span class="regexp">/script&gt;</span></span><br><span class="line"><span class="regexp">&lt;/body</span>&gt;</span><br></pre></td></tr></table></figure>
